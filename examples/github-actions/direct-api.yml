name: FailLens direct API example

on:
  workflow_dispatch:

jobs:
  faillens-direct-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run failing command through FailLens direct API
        uses: rileyross722/faillens-crash-gate@v0.1.0
        with:
          command: node -e "console.error(\"npm ERR! Cannot find module '@stripe/stripe-js'\"); console.error('Process completed with exit code 1'); process.exit(1)"
          faillens_api_url: ${{ secrets.FAILLENS_API_URL }}
          faillens_api_token: ${{ secrets.FAILLENS_API_TOKEN }}
          source: github_actions
          quiet: "true"
          fail_on_command_failure: "false"
