name: FailLens log file example

on:
  workflow_dispatch:

jobs:
  faillens-log-file:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate failing log
        id: test
        shell: bash
        run: |
          set +e
          node -e "console.error(\"npm ERR! Cannot find module '@stripe/stripe-js'\"); console.error('Process completed with exit code 1'); process.exit(1)" 2>&1 | tee faillens.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Triage failed log with FailLens
        if: steps.test.outputs.exit_code != '0'
        uses: rileyross722/faillens-crash-gate@v0.1.0
        with:
          log_file: faillens.log
          faillens_api_url: ${{ secrets.FAILLENS_API_URL }}
          faillens_api_token: ${{ secrets.FAILLENS_API_TOKEN }}
          source: github_actions
